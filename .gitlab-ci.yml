stages:
  - lint
  - test
  - build

variables:
  GOLANG_VERSION: "1.24"

lint:
  stage: lint
  image: golangci/golangci-lint:latest
  script:
    - golangci-lint run ./...

test:
  stage: test
  image: golang:${GOLANG_VERSION}
  script:
    - go test -v -race -coverprofile=coverage.out ./...
    - go tool cover -func=coverage.out
  artifacts:
    paths:
      - coverage.out
    expire_in: 7 days

build:
  stage: build
  image: golang:${GOLANG_VERSION}
  script:
    - go build -o bin/chat ./cmd/chat/
  artifacts:
    paths:
      - bin/chat
    expire_in: 7 days
